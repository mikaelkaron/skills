name: Release

on:
  workflow_dispatch:
    inputs:
      skip_install:
        description: "Skip step: @semantic-release/exec:install"
        type: boolean
        default: false
      skip_set_workspace_versions:
        description: "Skip step: @semantic-release/exec:set-workspace-versions"
        type: boolean
        default: false
      skip_build:
        description: "Skip step: @semantic-release/exec:build"
        type: boolean
        default: false
      skip_root:
        description: "Skip step: @semantic-release/npm:\\."
        type: boolean
        default: false
      skip_cli:
        description: "Skip step: @semantic-release/npm:packages/cli"
        type: boolean
        default: false
      skip_cherry_pick_filter:
        description: "Skip step: @semantic-release/npm:packages/cherry-pick-filter"
        type: boolean
        default: false
      skip_tessl:
        description: "Skip step: @semantic-release/npm:packages/tessl"
        type: boolean
        default: false
      skip_git:
        description: "Skip step: @semantic-release/git"
        type: boolean
        default: false
      skip_github:
        description: "Skip step: @semantic-release/github"
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {} # no GitHub API access needed — only writes to GITHUB_OUTPUT
    outputs:
      skip_steps: ${{ steps.assemble.outputs.skip_steps }}
    steps:
      - id: assemble
        env:
          SKIP_INSTALL: ${{ inputs.skip_install }}
          SKIP_SET_WORKSPACE_VERSIONS: ${{ inputs.skip_set_workspace_versions }}
          SKIP_BUILD: ${{ inputs.skip_build }}
          SKIP_ROOT: ${{ inputs.skip_root }}
          SKIP_CLI: ${{ inputs.skip_cli }}
          SKIP_CHERRY_PICK_FILTER: ${{ inputs.skip_cherry_pick_filter }}
          SKIP_TESSL: ${{ inputs.skip_tessl }}
          SKIP_GIT: ${{ inputs.skip_git }}
          SKIP_GITHUB: ${{ inputs.skip_github }}
        run: |
          steps=()
          [ "$SKIP_INSTALL" = "true" ] && steps+=("@semantic-release/exec:install")
          [ "$SKIP_SET_WORKSPACE_VERSIONS" = "true" ] && steps+=("@semantic-release/exec:set-workspace-versions")
          [ "$SKIP_BUILD" = "true" ] && steps+=("@semantic-release/exec:build")
          [ "$SKIP_ROOT" = "true" ] && steps+=("@semantic-release/npm:\\.")
          [ "$SKIP_CLI" = "true" ] && steps+=("@semantic-release/npm:packages/cli")
          [ "$SKIP_CHERRY_PICK_FILTER" = "true" ] && steps+=("@semantic-release/npm:packages/cherry-pick-filter")
          [ "$SKIP_TESSL" = "true" ] && steps+=("@semantic-release/npm:packages/tessl")
          [ "$SKIP_GIT" = "true" ] && steps+=("@semantic-release/git")
          [ "$SKIP_GITHUB" = "true" ] && steps+=("@semantic-release/github")
          echo "skip_steps=$(IFS='|'; echo "${steps[*]}")" >> $GITHUB_OUTPUT

  release:
    needs: setup
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pre' || github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/beta' || startsWith(github.ref, 'refs/heads/rc')
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SEMREL_SKIP_STEPS: ${{ needs.setup.outputs.skip_steps }}
