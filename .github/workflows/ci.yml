name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    if: >-
      (github.event_name == 'push' || !github.event.pull_request.draft) &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.event_name != 'pull_request' ||
       !contains(github.event.pull_request.title, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:types
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
      - uses: dorny/test-reporter@51956bab1c0d5107c4f16628b19ac384ab040405 # v1.3.0
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
