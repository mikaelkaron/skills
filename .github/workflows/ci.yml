name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:types
      - run: npm run test:coverage
      - name: Coverage summary
        if: always()
        run: node --experimental-strip-types scripts/coverage-summary.mts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
      - name: Test summary
        if: always()
        run: node --experimental-strip-types scripts/test-summary.mts test-results.ndjson
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.ndjson
