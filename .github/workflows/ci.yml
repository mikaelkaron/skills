name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    if: >-
      (github.event_name == 'push' || !github.event.pull_request.draft) &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.event_name != 'pull_request' ||
       !contains(github.event.pull_request.title, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:types
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
      - name: Fix test results XML
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          new_root = ET.Element('testsuites', root.attrib)
          for child in root:
              if child.tag in ('undefined', 'testsuite'):
                  for grandchild in child:
                      if grandchild.tag == 'testsuite':
                          new_root.append(grandchild)
                      elif grandchild.tag == 'testcase':
                          # Node.js JUnit bug: nested describes become <testcase>.
                          # Promote to a minimal <testsuite> stub so the parser
                          # never receives invalid structure.
                          stub = ET.Element('testsuite', {
                              'name': grandchild.get('name', 'unknown'),
                              'time': grandchild.get('time', '0'),
                              'tests': '0', 'failures': '0',
                              'errors': '0', 'skipped': '0',
                          })
                          new_root.append(stub)
          ET.ElementTree(new_root).write('test-results.xml', xml_declaration=True, encoding='unicode')
          EOF
      - uses: dorny/test-reporter@51956bab1c0d5107c4f16628b19ac384ab040405 # v1.3.0
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
