name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:types
      - run: npm run test:coverage
      - name: Test summary
        if: always()
        run: node --experimental-strip-types scripts/test-summary.mts test-results.ndjson
      - name: Coverage summary
        if: always()
        run: node --experimental-strip-types scripts/coverage-summary.mts
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results.ndjson
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
